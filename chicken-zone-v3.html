<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐔 Chicken Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" async></script>
<style>
:root{
  --bg:#0f0f0f; --surface:#1a1a1a; --card:#222; --border:#2e2e2e;
  --accent:#FFD700; --accent-hover:#F0C800; --accent-dim:rgba(255,215,0,.12);
  --text:#efefef; --text-muted:#888; --text-dim:#444;
  --danger:#ef4444; --success:#22c55e; --warning:#f59e0b; --info:#3b82f6;
  --ku-blue:#0051BA; --ku-red:#E8000D;
  --sidebar-w:240px;
  --ku-blue:#003087; --ku-red:#CC0000;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(circle at 20% 50%,rgba(255,215,0,.06) 0%,transparent 50%)}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:48px;width:420px;max-width:95vw}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .brand{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--accent);letter-spacing:3px;line-height:1}
.auth-logo .sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-muted);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* FORMS */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.form-control{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
.form-control:focus{border-color:var(--accent)}
.form-control option{background:var(--surface)}
textarea.form-control{resize:vertical;min-height:80px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--accent);color:#111}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{color:var(--text);background:var(--surface)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.mt-16{margin-top:16px}
/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto}
.sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-brand{padding:22px 16px 18px;border-bottom:1px solid var(--border);text-align:center}
.sidebar-brand .brand-name{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);letter-spacing:2px;line-height:1;text-align:center}
.sidebar-brand .brand-name .chicken{font-size:36px;vertical-align:middle;margin-right:4px}
.sidebar-brand .brand-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--ku-blue);letter-spacing:3px;text-transform:uppercase;margin-top:4px;text-align:center;font-weight:600}
.sidebar-nav{flex:1;padding:12px 0}
.nav-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);padding:12px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border)}
.user-info{font-size:11px;color:var(--text-muted);margin-bottom:10px;word-break:break-all}
#main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:32px}
/* PAGE HEADERS */
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ku-blue)}
.page-subtitle{font-size:13px;color:var(--ku-red);margin-top:2px;font-weight:600;letter-spacing:.5px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--accent);line-height:1}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-toolbar{padding:14px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
table{width:100%;border-collapse:collapse}
th{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
td{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.tr-clickable{cursor:pointer}
.tr-zero td{opacity:.45}
/* BADGES */
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.badge-new{background:rgba(34,197,94,.15);color:var(--success)}
.badge-good{background:rgba(59,130,246,.15);color:var(--info)}
.badge-fair{background:rgba(245,158,11,.15);color:var(--warning)}
.badge-poor{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-low{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-high{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-medium{background:rgba(245,158,11,.15);color:var(--warning)}
.badge-ok{background:rgba(34,197,94,.15);color:var(--success)}
.badge-overdue{background:rgba(239,68,68,.15);color:var(--danger)}
.badge-snoozed{background:rgba(100,100,100,.2);color:var(--text-muted)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:12px 12px 0 0}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ku-blue)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.close-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:22px;padding:2px 6px;line-height:1;transition:color .15s}
.close-btn:hover{color:var(--text)}
/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:14px;font-weight:500;animation:slideIn .25s ease;min-width:240px;max-width:340px}
.toast-success{background:rgba(34,197,94,.95);color:#fff}
.toast-error{background:rgba(239,68,68,.95);color:#fff}
.toast-info{background:rgba(59,130,246,.95);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alert-warning{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--warning)}
.alert-danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--danger)}
.alert-success{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:var(--success)}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;flex-wrap:wrap;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* VEHICLE CARDS */
.vehicle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.vehicle-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.vehicle-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.vehicle-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.vehicle-card:hover::before{opacity:1}
.vehicle-year-bg{font-family:'Bebas Neue',sans-serif;font-size:56px;color:var(--accent);line-height:1;opacity:.55;position:absolute;right:12px;top:10px}
/* MISC */
.empty-state{text-align:center;padding:56px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.flex-row{display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:20px 0}
.detail-field label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;display:block}
.detail-field .value{font-size:14px;color:var(--text)}
/* VEHICLE DETAIL */
.back-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:24px;padding:4px;transition:color .15s;flex-shrink:0}
.back-btn:hover{color:var(--accent)}
.service-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.install-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.reminder-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.reminder-card.due-soon{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.04)}
.reminder-card.overdue{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.04)}
/* MYSPACE PART PROFILE */
.ms-profile{background:linear-gradient(135deg,#0a0a1a 0%,#111 100%);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ms-banner{background:linear-gradient(135deg,#0051BA22 0%,#FFD70011 50%,#E8000D11 100%);border-bottom:1px solid var(--border);padding:24px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.ms-pic{width:110px;height:110px;border-radius:8px;border:3px solid var(--accent);object-fit:cover;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0}
.ms-pic img{width:100%;height:100%;object-fit:cover;border-radius:5px}
.ms-identity{flex:1;min-width:200px}
.ms-part-name{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);letter-spacing:2px;line-height:1;margin-bottom:4px}
.ms-part-cat{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ku-red);margin-bottom:8px}
.ms-status-line{font-size:13px;color:var(--text-muted);margin-bottom:4px}
.ms-status-line strong{color:var(--text)}
.ms-contact-box{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:14px;min-width:160px}
.ms-contact-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.ms-contact-btn{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-size:13px;cursor:pointer;margin-bottom:6px;transition:all .15s}
.ms-contact-btn:hover{border-color:var(--accent);color:var(--accent)}
.ms-body{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:300px}
.ms-col{padding:20px;border-right:1px solid var(--border)}
.ms-col:last-child{border-right:none}
.ms-box{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;margin-bottom:14px}
.ms-box-title{background:var(--ku-blue);color:#fff;padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-radius:8px 8px 0 0}
.ms-box-body{padding:12px 14px}
.ms-field{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;gap:8px}
.ms-field:last-child{border-bottom:none}
.ms-field-label{color:var(--text-muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.ms-field-val{color:var(--text);text-align:right;font-size:12px}
.compat-tag{display:inline-block;background:rgba(0,81,186,.2);border:1px solid rgba(0,81,186,.4);color:var(--info);border-radius:4px;padding:4px 8px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;margin:3px 2px}
.part-num-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.part-num-type{background:rgba(255,215,0,.12);color:var(--accent);border-radius:3px;padding:2px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}
/* WIZARD */
.wizard-step{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.wizard-progress{display:flex;gap:4px;margin-bottom:24px}
.wizard-dot{height:4px;flex:1;border-radius:2px;background:var(--border);transition:background .3s}
.wizard-dot.done{background:var(--accent)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;text-align:left;transition:all .15s}
.cat-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.cat-btn.sel{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 2px var(--accent)}
.cat-btn .cat-icon{font-size:22px;margin-bottom:6px}
.cat-btn .cat-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text)}
.cat-btn .cat-count{font-size:11px;color:var(--text-muted);margin-top:2px}
.part-suggestion{padding:10px 12px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:4px}
.part-suggestion:hover{background:var(--accent-dim);border-color:var(--accent)}
.part-suggestion.selected{background:var(--accent-dim);border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.part-suggestion .ps-name{font-weight:600;font-size:14px}
.part-suggestion .ps-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.part-suggestion .ps-rank{display:inline-block;background:rgba(239,68,68,.15);color:var(--danger);border-radius:3px;padding:1px 5px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-left:6px}
/* SORT BUTTONS */
.sort-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;color:var(--text-muted);transition:all .15s}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* LOCATION */
.loc-option{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;text-align:center;flex:1}
.loc-option:hover{border-color:var(--accent)}
.loc-option .lo-icon{font-size:28px;margin-bottom:8px}
.loc-option .lo-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase}
#qr-video{width:100%;max-height:220px;border-radius:8px;object-fit:cover;background:#000}
.wishlist-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:12px;position:fixed;top:0;left:0;z-index:200;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--accent);border-radius:2px;transition:all .3s}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.sidebar-overlay.visible{display:block}
@media(max-width:768px){.hamburger{display:flex}}
@media(max-width:768px){
  :root{--sidebar-w:0px}
  #sidebar{transform:translateX(-240px);transition:transform .3s}
  #sidebar.open{transform:translateX(0);width:240px}
  #main-content{margin-left:0;padding:16px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .ms-body{grid-template-columns:1fr}
  .ms-col{border-right:none;border-bottom:1px solid var(--border)}
}
@media print{
  body{background:#fff!important;color:#000!important}
  #sidebar,.no-print,#toast-container{display:none!important}
  #main-content{margin:0!important;padding:20px!important}
}
</style>
</head>
<body>
<div id="toast-container"></div>
<button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="brand">🐔 Chicken Zone</div>
      <div class="sub">Inventory Manager</div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Sign In</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Register</div>
    </div>

  'co10':{tools:['Hose clamp pliers','Drain bucket'],hardware:['Heater hose kit'],time:'30-45 min',tip:'Check the quick-connect fittings at the intake manifold - they are a known leak point on LS engines. Push in and rotate to release.'},
  // FUEL SYSTEM
  'fu01':{tools:['Fuel pump removal tool (locking ring)','Jack stands','Drain bucket','Fire extinguisher nearby'],hardware:['Fuel pump module','New o-ring'],time:'2-4 hrs',tip:'FIRE HAZARD. Disconnect battery and relieve fuel pressure first. Work in ventilated area. No sparks. Use locking ring tool to avoid damaging retaining ring.'},
  'fu02':{tools:['Flathead screwdriver','Fuel rail removal'],hardware:['Fuel pressure regulator'],time:'30-45 min',tip:'On fuel rail. Relieve pressure first. O-ring often hardens and causes hard start when cold. Lube new o-ring with clean oil.'},
  'fu03':{tools:['10mm socket','Jack and stands'],hardware:['Charcoal canister'],time:'30-45 min',tip:'Under vehicle near fuel tank. Disconnect three lines and electrical connector. Saturated canister causes EVAP codes and rich smell.'},
  'fu04':{tools:['Screwdriver set','Hose pliers'],hardware:['Filler neck','Clamps'],time:'45 min-1.5 hrs',tip:'Lower the fuel tank slightly for access. Plastic cracks near clamp connection. Causes fuel smell and EVAP leak codes.'},
  'fu05':{tools:['Floor jack','Jack stands','Fuel line disconnect tools','Drain equipment'],hardware:['Fuel tank','Straps','Tank mounting hardware'],time:'4-6 hrs',tip:'Drain tank completely first. Have an assistant for tank removal and installation. Check for rust on tank straps and replace if needed.'},
  // TRANSMISSION
  'tr02':{tools:['T27 Torx','Drain pan','Flathead screwdriver','Electrical connector tool'],hardware:['Shift solenoid set','Pan gasket','Dexron VI to top off'],time:'1.5-2.5 hrs',tip:'Drop the pan to access solenoids. Replace all solenoids at same time while pan is off. Check wiring harness inside pan for damage.'},
  'tr03':{tools:['T27 Torx','Drain pan'],hardware:['TCC solenoid','Pan gasket'],time:'1.5-2 hrs',tip:'TCC shudder at 40-50 mph is the classic symptom. Replace fluid at same time. Sometimes a fluid flush with new Dexron VI clears mild shudder.'},
  'tr04':{tools:['19mm socket or speed sensor socket'],hardware:['Input and output speed sensors','O-rings'],time:'20-30 min',tip:'Located on the side of the transmission. Unplug connector, remove bolt, pull sensor. Lube new o-ring with clean ATF.'},
  'tr05':{tools:['15mm socket','Jack and jack stands'],hardware:['Transmission mount'],time:'30-45 min',tip:'Support transmission with jack before removing old mount. Clunk when shifting or accelerating = worn mount.'},
  'tr06':{tools:['Flathead screwdriver','Needle nose pliers'],hardware:['Shifter cable','New bushing kit'],time:'30-45 min',tip:'The plastic bushing at the cable end breaks. Bushing kits are much cheaper than full cable. Gear selector feels sloppy or stuck.'},
  'tr07':{tools:['Transmission must be removed','Transmission jack','Various sockets','Torque wrench'],hardware:['Torque converter','New converter seal'],time:'6-10 hrs (trans removal)',tip:'Shudder at 40-50 mph that returns after fluid change = bad converter. Have transmission shop bench test before condemning.'},
  // TRANSFER CASE
  'tc01':{tools:['7mm nut driver','T25 Torx','Electrical connector release tool'],hardware:['Encoder motor'],time:'30-60 min',tip:'Disconnect battery first. Three bolts hold the motor. 4WD light flashing or stuck in 4WD = this motor. No fluid loss during this repair.'},
  'tc02':{tools:['10mm socket','TCCM programming if needed'],hardware:['Transfer case control module'],time:'30-60 min',tip:'Located under driver seat or in cab. May need dealer programming after replacement. Check for corroded connector before replacing module.'},
  'tc03':{tools:['17mm socket','Drain pan','Seal driver or deep socket'],hardware:['Front output seal','New driveshaft u-joint recommended'],time:'45 min-1.5 hrs',tip:'Remove front driveshaft first. Pry old seal out carefully. Drive new seal in evenly. Check and repack front driveshaft u-joints while its off.'},
  // DRIVETRAIN
  'dr01':{tools:['36mm axle nut socket','Torque wrench','Pry bar','Floor jack','Jack stands','Snap ring pliers'],hardware:['CV axle shaft','New axle nut'],time:'1.5-2.5 hrs',tip:'Clicking in turns = failed inner or outer CV joint. Torque new axle nut to 177 ft-lbs. Check differential fluid level after.'},
  'dr02':{tools:['36mm axle nut socket','Torque wrench','Pry bar','Floor jack','Jack stands'],hardware:['CV axle shaft','New axle nut'],time:'1.5-2.5 hrs',tip:'Same as driver side. Passenger side may be easier to access. Replace both sides if high mileage.'},
  'dr03':{tools:['Axle shaft puller or slide hammer','C-clip pliers','Bearing press if bearing damaged'],hardware:['Axle shaft','New axle seals','Gear oil to top off'],time:'1-2 hrs per side',tip:'Axle retention is C-clip style inside the differential. Remove diff cover to access. Replace axle seals every time axle is removed.'},
  'dr04':{tools:['Driveshaft u-joint press or C-clamp method','Snap ring pliers','Hammer','Grease gun'],hardware:['U-joint set','Snap rings'],time:'1-2 hrs',tip:'Can be done with driveshaft on vehicle if you have a u-joint press. Press out old cups evenly. Grease all fittings after installation.'},
  'dr05':{tools:['U-joint press or C-clamp','Snap ring pliers','Hammer','Grease gun'],hardware:['U-joint set','Snap rings'],time:'1-2 hrs',tip:'Vibration at highway speed felt in floorboard = rear u-joints. Rotate driveshaft and feel for binding or roughness.'},
  'dr06':{tools:['10mm socket','Drain pan','Gasket scraper or RTV'],hardware:['Front diff cover gasket','75W-90 fluid to refill'],time:'30-45 min',tip:'Drain fluid first. Clean mating surfaces. Refill until fluid drips from fill hole with axle at ride height.'},
  'dr07':{tools:['10mm socket','Drain pan','Gasket scraper or RTV'],hardware:['Rear diff cover gasket','75W-90 fluid to refill','Limited slip additive if G80'],time:'30-45 min',tip:'Great time to check ring and pinion for excessive wear. Fill until fluid is at bottom edge of fill hole.'},
  'dr08':{tools:['Companion flange holder tool','27mm socket','Seal puller','Seal driver'],hardware:['Pinion seal','New pinion nut'],time:'45 min-1.5 hrs',tip:'Mark companion flange position before removal to preserve pinion preload. The pinion nut is a one-time use crush sleeve design.'},
  // BRAKES
  'br01':{tools:['C-clamp or piston cube tool','12mm socket','Wire brush','Brake cleaner','Torque wrench','Grease'],hardware:['Brake pads','Hardware kit','Caliper lube'],time:'45 min-1.5 hrs',tip:'Never press pedal with piston compressed until cap is on reservoir. Replace hardware kit every pad change. Bed new pads with 10 moderate stops.'},
  'br02':{tools:['C-clamp or piston cube tool','12mm socket','Wire brush','Brake cleaner','Torque wrench'],hardware:['Rear brake pads','Hardware kit','Caliper lube'],time:'45 min-1.5 hrs',tip:'Rear caliper has integrated parking brake - wind piston in clockwise, do not press. Need cube tool to retract. Rear pads wear slower than fronts.'},
  'br03':{tools:['18mm socket','Torque wrench','Wire brush','Brake cleaner'],hardware:['Front rotors x2','Lug nuts inspect'],time:'1-2 hrs',tip:'Replace pads at same time as rotors. Check minimum thickness with micrometer. Torque lug nuts to 140 ft-lbs in star pattern.'},
  'br04':{tools:['18mm socket','Torque wrench','Wire brush'],hardware:['Rear rotors x2'],time:'1-2 hrs',tip:'Heavy surface rust is normal on rotors - check actual metal thickness with micrometer. Minimum is stamped on rotor hat.'},
  'br05':{tools:['Caliper wind-back tool','12mm socket','Brake line wrench (3/8")','Bleeder kit','Drain pan'],hardware:['Calipers x2','Brake fluid','Copper washers'],time:'2-3 hrs',tip:'Bench bleed calipers before installing. Bleed all 4 corners after. Use DOT 3 fluid. Torque caliper bolts to 38 ft-lbs.'},
  'br06':{tools:['Cube wind-back tool (rear caliper)','12mm socket','Brake line wrench','Bleeder kit'],hardware:['Rear calipers x2','Brake fluid','Copper washers'],time:'2-3 hrs',tip:'Rear caliper pistons rotate clockwise to retract - they DO NOT press in. Cube tool required. Check parking brake cable adjustment after.'},
  'br07':{tools:['Wire brush','Brake cleaner'],hardware:['Front brake hardware kit'],time:'15 min (add on to pad job)',tip:'Always replace the hardware when changing pads. Clips transfer heat and stress - old ones can cause uneven wear and noise.'},
  'br08':{tools:['Wire brush','Brake cleaner'],hardware:['Rear brake hardware kit'],time:'15 min (add on to pad job)',tip:'Same as front. Rear hardware also includes the parking brake cable clip on some models.'},
  'br09':{tools:['10mm socket','Penetrating oil'],hardware:['Front left ABS sensor'],time:'20-30 min',tip:'Sensor is integral to front wheel hub on GMT800. If sensor wire is damaged the whole hub assembly may need replacement.'},
  'br10':{tools:['10mm socket','Penetrating oil'],hardware:['Front right ABS sensor'],time:'20-30 min',tip:'Same as driver side. Clean mounting bore before installing new sensor.'},
  'br11':{tools:['10mm socket or hex key','Penetrating oil'],hardware:['Rear left ABS sensor'],time:'15-25 min',tip:'Rear sensor mounts to the axle housing. Single bolt. Tone ring is on the axle shaft - inspect for damage or rust buildup.'},
  'br12':{tools:['10mm socket','Penetrating oil'],hardware:['Rear right ABS sensor'],time:'15-25 min',tip:'Same as rear driver side. ABS codes C0045/C0050 for rear sensors.'},
  'br13':{tools:['11mm brake line wrench','Drain pan','Bench bleed kit'],hardware:['Brake master cylinder','Brake fluid'],time:'1-2 hrs',tip:'Bench bleed master cylinder before installing. Spongy pedal that does not improve with bleeding = MC failure. Check under carpet for fluid leak first.'},
  'br14':{tools:['13mm socket','Vacuum line tool','Brake line wrench'],hardware:['Brake booster'],time:'1.5-2.5 hrs',tip:'Hard pedal effort is main symptom. Check vacuum line first - a cracked hose is a cheap fix. Booster uses engine vacuum to multiply braking force.'},
  'br15':{tools:['Hands only'],hardware:['Brake light switch'],time:'5-10 min',tip:'Clip-in design on the brake pedal bracket. No brake lights or cruise control that will not engage = check this first. Very cheap and easy.'},
  'br16':{tools:['Brake line wrenches','Flare nut wrench set'],hardware:['Proportioning valve','Brake fluid'],time:'45 min-1.5 hrs',tip:'Rear wheels locking before fronts = bad valve. Bleed entire brake system after. Rear bias set at factory, do not adjust.'},
  // SUSPENSION
  'su01':{tools:['Ball joint press','Pickle fork or separator','21mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Upper ball joints x2','Cotter pins'],time:'2-4 hrs per side',tip:'SAFETY CRITICAL. Upper ball joint failure is a known GMT800 issue. Inspect annually. Torque to 37 ft-lbs. Grease fittings at every oil change.'},
  'su02':{tools:['Ball joint press','Pickle fork','19mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Lower ball joints x2','Cotter pins'],time:'2-3 hrs per side',tip:'Less common failure than upper but check both together. Press-in design requires ball joint press. Get alignment after.'},
  'su03':{tools:['36mm axle nut socket','Torque wrench','Floor jack','Jack stands','Pry bar','Hammer'],hardware:['Hub/bearing assembly','New axle nut'],time:'1.5-3 hrs',tip:'Hub contains the bearing and ABS sensor. Torque axle nut to 177 ft-lbs. Grinding noise that changes when turning = confirm with jounce test.'},
  'su04':{tools:['36mm axle nut socket','Torque wrench','Floor jack','Jack stands'],hardware:['Hub/bearing assembly','New axle nut'],time:'1.5-3 hrs',tip:'Same as driver side hub. Replace both sides if mileage is high since they wear at similar rates.'},
  'su05':{tools:['Floor jack','Jack stands','17mm socket','Torque wrench','Bearing press if needed'],hardware:['Rear wheel bearings x2'],time:'2-3 hrs',tip:'Pressed into axle housing. Grumble or roar that changes tone when changing lanes = confirm with coast test. Verify side before pulling.'},
  'su06':{tools:['18mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Front shocks x2'],time:'1-2 hrs',tip:'Replace in pairs always. Upper mount bolt is 15mm, lower is 18mm. Bilstein 5100 or Monroe OE Spectrum are excellent replacements.'},
  'su07':{tools:['18mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Rear shocks x2'],time:'1-2 hrs',tip:'These trucks are heavy - quality shocks matter. Bouncing, poor handling, and cupped tires all indicate worn shocks.'},
  'su08':{tools:['15mm wrench and socket','Torque wrench'],hardware:['Front sway bar end links x2'],time:'30-45 min',tip:'Spray penetrating oil 30 min before. Clunking over bumps or speed bumps = end links. Very common GMT800 wear item. Torque to 13 ft-lbs.'},
  'su09':{tools:['15mm wrench and socket','Torque wrench'],hardware:['Rear sway bar end links x2'],time:'30-45 min',tip:'Same clunk as front but over rear bumps. Less common failure than front.'},
  'su10':{tools:['18mm socket','Torque wrench','Bushing installation tool or large socket'],hardware:['Sway bar bushings','Poly lubricant if polyurethane type'],time:'30-45 min',tip:'Squeaking from front end when turning = these bushings. Grease polyurethane versions or they squeak immediately. Rubber OEM style is squeak-free.'},
  'su11':{tools:['Tie rod end puller','32mm wrench','Torque wrench','Cotter pin pliers'],hardware:['Outer tie rod ends x2','Cotter pins'],time:'45 min-1.5 hrs',tip:'Count and record the turns to remove old one. Thread new one in same count for rough alignment. Get alignment after - do not skip this step.'},
  'su12':{tools:['Inner tie rod tool (special)','Torque wrench','Cotter pin pliers'],hardware:['Inner tie rod ends x2','Cotter pins'],time:'1-2 hrs',tip:'Requires a special inner tie rod tool to unscrew from the rack/center link. Less common than outer. Get alignment after.'},
  'su13':{tools:['21mm socket','Torque wrench','Ball joint press','Floor jack','Jack stands'],hardware:['Upper control arms x2'],time:'2-3 hrs per side',tip:'Many aftermarket UCA kits include ball joints. Helps correct alignment caster. Get alignment after replacement.'},
  'su14':{tools:['21mm socket','18mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Lower control arms x2'],time:'2-3 hrs per side',tip:'Includes front and rear bushings. Replace when bushings are cracked or arms are bent. Get alignment after.'},
  'su15':{tools:['18mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Rear upper control arms'],time:'1.5-2.5 hrs',tip:'Rear alignment adjustment is done via eccentric bolts on the upper arm. Mark bolt positions before removal for rough alignment.'},
  'su16':{tools:['21mm socket','Torque wrench','Floor jack','Jack stands'],hardware:['Rear lower control arms'],time:'1.5-2.5 hrs',tip:'Heaviest rear suspension arm. Inspect for bends after off-road use or pothole impacts.'},
  'su17':{tools:['21mm socket','Torque wrench','Pickle fork or separator'],hardware:['Idler arm','Cotter pin'],time:'45 min-1.5 hrs',tip:'Connects to center link on passenger side. Worn idler and pitman arm together cause wander - replace both at same time.'},
  'su18':{tools:['Pitman arm puller (required)','24mm socket','Torque wrench'],hardware:['Pitman arm'],time:'45 min-1 hr',tip:'Must use a pitman arm puller - do not use pickle fork or you will damage the steering gear. Torque castle nut to 180 ft-lbs with cotter pin.'},
  // STEERING
  'st01':{tools:['18mm socket','Hose clamp pliers','Drain bucket','Pulley puller if needed'],hardware:['Power steering pump','New PS fluid','Hose o-rings'],time:'1-2 hrs',tip:'Check fluid level first - a low fluid level mimics a bad pump. Flush old fluid while replacing. Bleed by turning wheel lock to lock several times.'},
  'st02':{tools:['Flare nut wrenches','Hose removal tool'],hardware:['High pressure PS hose','New o-rings or fitting'],time:'45 min-1 hr',tip:'Common leak point is at the pump fitting. Check entire length of hose including metal fittings. Fluid on engine underside confirms leak location.'},
  'st03':{tools:['Hose clamp pliers','Drain bucket'],hardware:['PS return hose','Clamps'],time:'30-45 min',tip:'Softer low pressure side. Check at clamp ends first. Cracked or oil-soaked hose = replace. Low cost part.'},
  'st04':{tools:['21mm socket','Pitman arm puller','Flare nut wrenches for PS lines','Torque wrench'],hardware:['Steering gear box','New PS fluid'],time:'3-5 hrs',tip:'Leaking sector shaft seal is common. Rebuild is a valid option - cheaper than full replacement. Torque mounting bolts to 70 ft-lbs.'},
  // ELECTRICAL
  'el01':{tools:['8mm socket or wrench','Battery terminal cleaner','Anti-corrosion spray'],hardware:['Group 78 battery','Battery terminal protectors'],time:'15-20 min',tip:'Disconnect negative first, reconnect negative last. Clean terminals with wire brush. 6.0L pulls big current - do not cheap out on CCA rating.'},
  'el02':{tools:['10mm socket','13mm socket','Serpentine belt tool to remove belt first'],hardware:['Alternator','New belt if worn'],time:'1-2 hrs',tip:'Check belt and tensioner while alternator is out. Test old alternator at auto parts store before buying new - they test for free.'},
  'el03':{tools:['13mm socket','Floor jack or access from above'],hardware:['Starter motor'],time:'45 min-1.5 hrs',tip:'Heat soak failure is common - starter works when cold but not when hot. Click but no crank = starter solenoid or cable. Slow crank = battery first.'},
  'el04':{tools:['7mm nut driver','Flathead screwdriver'],hardware:['Blower motor'],time:'20-30 min',tip:'Passenger side under dash. Disconnect battery first. Remove small access cover. Motor has two screws and one electrical connector.'},
  'el05':{tools:['7mm nut driver'],hardware:['Blower motor resistor'],time:'10-15 min',tip:'MOST COMMON GMT800 HVAC repair. Fan works ONLY on high = this is the fix 99% of the time. Under passenger dash, two screws. Takes 10 minutes.'},
  'el06':{tools:['10mm socket','T30 Torx','Panel clip tool','Door panel removal tool'],hardware:['Window regulator (motor often included)'],time:'1.5-3 hrs',tip:'Remove door panel carefully - clips break. Peel back vapor barrier. Window glass must be supported or it will fall into door.'},
  'el07':{tools:['10mm socket','T30 Torx','Panel clip tool'],hardware:['Front right window regulator'],time:'1.5-3 hrs',tip:'Same process as driver side. Very common failure on GMT800 trucks and SUVs.'},
  'el08':{tools:['10mm socket','T30 Torx','Panel clip tool'],hardware:['Rear left window regulator'],time:'1.5-2.5 hrs',tip:'Rear panels have fewer clips but similar removal process. Rear windows fail less often than fronts.'},
  'el09':{tools:['10mm socket','T30 Torx','Panel clip tool'],hardware:['Rear right window regulator'],time:'1.5-2.5 hrs',tip:'Rear passenger door regulator. Same failure symptoms as other regulators - window falls or grinds.'},
  'el10':{tools:['10mm socket','Panel clip tool','Electrical connector tool'],hardware:['Door lock actuator'],time:'45 min-1.5 hrs',tip:'Door panel removal required. Clicking sound when locking but door does not lock = actuator motor. Old actuators are riveted in - drill out rivets.'},
  'el11':{tools:['10mm socket','Panel clip tool'],hardware:['Front right door lock actuator'],time:'45 min-1.5 hrs',tip:'Same as driver side actuator. All four doors are common failures on older GMT800 vehicles.'},
  'el12':{tools:['10mm socket','Panel clip tool'],hardware:['Rear left door lock actuator'],time:'30-45 min',tip:'Rear door panels are simpler to remove than front doors. Same actuator failure symptoms.'},
  'el13':{tools:['10mm socket','Panel clip tool'],hardware:['Rear right door lock actuator'],time:'30-45 min',tip:'Last of the four actuators. If all four are failing, do them all at once while you have the tools out.'},
  'el14':{tools:['Valve stem tool','TPMS activation tool or drive the vehicle'],hardware:['TPMS sensors x4','New valve stems x4'],time:'30-45 min (with tire mount)','tip':'Need tire shop to unmount and remount tires. 315MHz frequency. Sensors must be programmed after install - many shops do this for free.'},
  'el15':{tools:['Fuse puller or flathead screwdriver'],hardware:['Fuel pump relay','Test relay same amp rating'],time:'5-10 min',tip:'In underhood fuse box. Swap with another identical relay to test before buying. No-start with no fuel pressure = check relay first, it is free.'},
  'el16':{tools:['10mm socket','PCM programming required'],hardware:['PCM/ECM - requires VIN programming'],time:'1-2 hrs',tip:'MUST be programmed with the correct VIN and calibration. Cannot just swap from another vehicle. Used modules are risky - get a reman unit.'},
  'el17':{tools:['Torx T20 or T25','Electrical connector release pick'],hardware:['Turn signal multifunction switch'],time:'30-60 min',tip:'Steering column shroud must come off. Airbag precaution - disconnect battery and wait 10 min before working near steering column.'},
  'el18':{tools:['Torx T20','Electrical connector release pick'],hardware:['Ignition switch (electrical portion)'],time:'20-30 min',tip:'This is the electrical switch only, not the lock cylinder. Accessories randomly dropping out = this switch. No disassembly of steering column needed.'},
  'el19':{tools:['10mm socket','Electrical connector release tool'],hardware:['Neutral safety switch / range sensor'],time:'20-30 min',tip:'On the left side of the transmission. Try adjusting first before replacing - loosen bolts and shift to Neutral, center the switch and retighten.'},
  'el20':{tools:['10mm socket','Electrical connector tool'],hardware:['Horn','Fuse if blown'],time:'15-20 min',tip:'Check fuse and relay first. Horn is behind front grille, typically two bolts. Weak horn = corroded ground wire.'},
  // LIGHTING
  'li01':{tools:['10mm socket','Panel trim tools','Plastic pry bar'],hardware:['Headlight assemblies x2','Bulbs if reusing'],time:'30-45 min per side',tip:'Three bolts per assembly plus electrical connectors. Faded yellow lenses can be restored with headlight restoration kit - cheaper than replacement.'},
  'li02':{tools:['Gloves (do not touch bulb glass)'],hardware:['H13 bulbs x2'],time:'10-15 min',tip:'Access from engine bay. Twist the bulb socket counterclockwise to remove. Do not touch glass with bare hands - oil causes hot spots and early failure.'},
  'li03':{tools:['7mm socket or access from engine bay'],hardware:['Fog light bulbs'],time:'10-20 min',tip:'Some models require removing the fog light housing for bulb access. Check fitment carefully - H11 and H16 look similar but are different.'},
  'li04':{tools:['7mm socket','Trim panel tool'],hardware:['Tail light assemblies x2'],time:'20-30 min per side',tip:'Accessible from inside cargo area or liftgate. Moisture enters and causes shorts. Reseal with silicone if housing is intact.'},
  'li05':{tools:['Torx T15','Ladder for Yukon/Escalade'],hardware:['Third brake light assembly or LED strip'],time:'15-20 min',tip:'Top of rear roof/liftgate area. Usually 2-4 Torx screws. LED upgrade available and lasts much longer than incandescent.'},
  'li06':{tools:['Hands only - clips into place'],hardware:['Brake light switch'],time:'5-10 min',tip:'Same part as br15. Clip-in design at the brake pedal. No brake lights AND no cruise control = almost always this switch.'},
  // INTERIOR
  'in01':{tools:['Panel clip tool','10mm socket'],hardware:['Door handle','Clip kit'],time:'30-60 min',tip:'Panel removal required. Plastic clips on the inner door handle break with age. Pull handle assembly from door, transfer rod clips to new handle.'},
  'in02':{tools:['10mm socket or trim tool'],hardware:['Rearview mirror'],time:'10-15 min',tip:'Unplug OnStar/auto-dim connector if equipped. Mirror clips onto a mount - press the tab and slide down to remove. Easy swap.'},
  'in03':{tools:['Flathead screwdriver','Panel trim tool'],hardware:['Climate control head unit'],time:'30-60 min',tip:'Radio surround must come off first. Dual zone models are more expensive. Try cleaning button contacts with electronics cleaner before replacing.'},
  'in04':{tools:['Panel clip tool'],hardware:['Master window switch'],time:'15-20 min',tip:'Pry up with a plastic tool from the front edge. Individual window switch contacts fail. If only one window is affected, that door switch is the culprit.'},
  'in05':{tools:['Panel clip tool','Electrical connector tool'],hardware:['Power seat switch'],time:'15-25 min',tip:'Pry up from the seat side panel or console depending on location. Seat stuck = likely switch, not motor. Motors rarely fail.'},
  'in06':{tools:['Flathead screwdriver','Pliers'],hardware:['Fuel door release cable'],time:'20-30 min',tip:'Cable connects handle inside cab to fuel door latch. Cable end pops off its clip. Replacement cable kits include new clips and hardware.'},
  'in07':{tools:['Torx T50','Socket set'],hardware:['Seat belt assembly'],time:'45 min-1 hr',tip:'Safety item - do not reuse deployed seatbelts or ones that have been in a serious accident. Torque anchor bolt to 35 ft-lbs.'},
  'in08':{tools:['Torx T25','Small flathead'],hardware:['Sun visor'],time:'10-15 min',tip:'Two Torx screws in the headliner. The pivot is what usually breaks, causing it to fall. Disconnect wiring if illuminated visor.'},
  'in09':{tools:['Panel trim tool','Flathead screwdriver'],hardware:['Dome light assembly or LED bulbs'],time:'10-15 min',tip:'Pry gently from front edge. Stays on with door closed = door ajar switch in one of the doors. LED upgrade is easy and much brighter.'},
  'in10':{tools:['Torx T15','Panel trim tool'],hardware:['Gauge cluster or stepper motor rebuild kit'],time:'1-2 hrs',tip:'Needles that jump or sweep randomly = stepper motor failure. Stepper motor rebuild kits are $20-40 and fix all gauges. Full cluster replacement requires mileage match or dealer programming.'},
  // EXTERIOR
  'ex01':{tools:['Panel clip tool','Flathead screwdriver'],hardware:['Outer door handles','Clips'],time:'30-60 min each',tip:'Door panel removal required. Transfer the rod clip and lock rod to new handle. Passenger front fails most - chrome peels and plastic cracks.'},
  'ex02':{tools:['10mm socket','T30 Torx'],hardware:['Side mirror assembly'],time:'20-30 min',tip:'Remove inside door panel triangle cover. Three nuts hold the mirror. Unplug harness. Heated and turn signal mirrors must match OEM specs.'},
  'ex03':{tools:['Hands'],hardware:['Wiper blades x2'],time:'5-10 min',tip:'Pinch the release tab and slide off. 24 inch driver, 18 inch passenger on most GMT800. Beam style blades are quieter in winter.'},
  'ex04':{tools:['Hands'],hardware:['Rear wiper blade'],time:'5 min',tip:'Pull wiper arm away from glass, press release tab, slide blade off. Rear wiper blade is often forgotten until it smears badly.'},
  'ex05':{tools:['10mm socket','T20 Torx','Wiper linkage pliers'],hardware:['Front wiper motor'],time:'1-2 hrs',tip:'Wiper motor is behind the firewall on the passenger side. Wipers park in wrong position or stop mid-sweep = motor failure.'},
  'ex06':{tools:['10mm socket'],hardware:['Hood struts x2'],time:'10-15 min',tip:'Escalade uses struts instead of a prop rod. Hood falls or will not stay up = weak struts. Simple 10mm bolt at each end.'},
  'ex07':{tools:['Trim removal tool','Hands'],hardware:['Liftgate gas struts x2'],time:'15-20 min',tip:'Pop ball socket off mount with a flathead, careful not to scratch trim. Replace in pairs. Liftgate falls or only stays up partway = struts are done.'},
  // HVAC
  'hv01':{tools:['10mm socket','AC manifold gauge set (or shop handles this)','Belt removal tools'],hardware:['AC compressor','New refrigerant oil','O-ring kit','New receiver drier required when opening system'],time:'3-5 hrs',tip:'Opening AC system requires EPA 609 certification or shop. Replace receiver drier simultaneously. Flush lines if old compressor failed. Recharge with correct refrigerant amount.'},
  'hv02':{tools:['10mm socket','Radiator removal may help access'],hardware:['AC condenser','O-rings','Receiver drier (replace when opening system)'],time:'2-4 hrs',tip:'Located in front of radiator. Inspect for bent fins from road debris. AC system must be recovered before removal. Recharge after.'},

function renderPartsList(el){
  if(!el) el=document.getElementById('view-parts');
  // Build combined list: GMT800 catalog + custom DB parts not in catalog
  const catalogIds=new Set(GMT800.map(p=>p.id));
  const customParts=dbInventory.filter(p=>!p.catalog_part_id||!catalogIds.has(p.catalog_part_id));

  // For each catalog part, find matching inventory
  let combined=GMT800.map(cp=>{
    const inv=dbInventory.filter(p=>p.catalog_part_id===cp.id);
    const qty=inv.reduce((sum,p)=>sum+p.quantity,0);
    return{...cp,_type:'catalog',_inv:inv,_qty:qty};
  });

  // Add custom parts
  customParts.forEach(p=>{combined.push({id:p.id,name:p.name,cat:p.source||'Custom',sub:'',oem:p.part_number||'',rank:999,_type:'custom',_inv:[p],_qty:p.quantity})});

  // Filter
  if(partSearch){const s=partSearch.toLowerCase();combined=combined.filter(p=>p.name.toLowerCase().includes(s)||p.cat.toLowerCase().includes(s)||p.sub.toLowerCase().includes(s)||p.oem.toLowerCase().includes(s))}

  // Apply qty filter
  if(partsQtyFilter==='instock') combined=combined.filter(p=>p._qty>0);
  else if(partsQtyFilter==='outstock') combined=combined.filter(p=>p._qty===0);

  // Sort - when 'all' is active, pin in-stock items above out-of-stock within the sort
  const dir=partsSortDir;
  function innerSort(a,b){
    if(partsSort==='alpha') return dir*a.name.localeCompare(b.name);
    if(partsSort==='cat') return dir*(a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));
    if(partsSort==='freq') return dir*(a.rank-b.rank);
    if(partsSort==='qty') return dir*(b._qty-a._qty);
    if(partsSort==='loc') return dir*(a._inv[0]?.shelf_location||'zzz').localeCompare(b._inv[0]?.shelf_location||'zzz');
    if(partsSort==='cond') return dir*((a._inv[0]?.condition||'').localeCompare(b._inv[0]?.condition||''));
    if(partsSort==='oem') return dir*(a.oem||'').localeCompare(b.oem||'');
    return dir*a.name.localeCompare(b.name);
  }
  combined.sort(function(a,b){
    // Pin qty>0 above qty=0 when viewing all
    if(partsQtyFilter==='all'){
      const aHas = a._qty>0 ? 0 : 1;
      const bHas = b._qty>0 ? 0 : 1;
      if(aHas !== bHas) return aHas - bHas;
    }
    return innerSort(a,b);
  });

  const total=combined.length, inStock=combined.filter(p=>p._qty>0).length;

  el.innerHTML=`
    <div class="page-header"><div style="text-align:center;flex:1"><div class="page-title" style="font-size:42px;text-align:center">Auto Parts</div><div class="page-subtitle" style="font-size:12px;text-align:center">${inStock} of ${total} parts in stock</div></div>
      <button class="btn btn-primary" onclick="showAddPartChoice()">+ Add New Part to Inventory</button>
    </div>
    <div class="table-wrap">
      <div class="table-toolbar">
        <input type="text" class="search-input" id="parts-search" placeholder="🔍  Search name, category, part number..." value="${esc(partSearch)}" oninput="onPartsSearch(this.value)">
        <div class="flex-row" style="gap:4px">
          <button class="sort-btn ${partsQtyFilter==='all'?'active':''}" onclick="setPartsQtyFilter('all')">All</button>
          <button class="sort-btn ${partsQtyFilter==='instock'?'active':''}" onclick="setPartsQtyFilter('instock')">In Stock</button>
          <button class="sort-btn ${partsQtyFilter==='outstock'?'active':''}" onclick="setPartsQtyFilter('outstock')">Out of Stock</button>
        </div>
      </div>
      <table>
        <thead><tr>
          <th onclick="setPartsSort('alpha')" style="cursor:pointer;white-space:nowrap">Part Name ${partsSort==='alpha'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('cat')" style="cursor:pointer;white-space:nowrap">Category ${partsSort==='cat'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('oem')" style="cursor:pointer;white-space:nowrap">OEM # ${partsSort==='oem'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('cond')" style="cursor:pointer;white-space:nowrap">Condition ${partsSort==='cond'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('loc')" style="cursor:pointer;white-space:nowrap">Location ${partsSort==='loc'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('freq')" style="cursor:pointer;text-align:center;white-space:nowrap" title="How often this part typically fails across all GMT800 vehicles. #1 is the most commonly replaced part. Lower numbers = replaced more often. Color coding: red=top 10, yellow=top 25.">Fail Rank ℹ️ ${partsSort==='freq'?(partsSortDir>0?'▲':'▼'):''}</th>
          <th onclick="setPartsSort('qty')" style="cursor:pointer;text-align:right;white-space:nowrap">Qty ${partsSort==='qty'?(partsSortDir>0?'▲':'▼'):''}</th>
        </tr></thead>
        <tbody>
          ${combined.map(p=>{
            const qty=p._qty;
            const isZero=qty===0;
            const topInv=p._inv[0];
            const cond=topInv?.condition||'';
            const loc=topInv?.shelf_location||'';
            const failRank=p.rank<999?p.rank:'';
            return`<tr class="tr-clickable ${isZero?'tr-zero':''}" onclick="showPartProfile('${p.id}','${p._type}')">
              <td><strong>${esc(p.name)}</strong>${p.sub?`<span style="font-size:11px;color:var(--text-muted);margin-left:6px">${esc(p.sub)}</span>`:''}</td>
              <td><span style="font-size:12px;color:var(--text-muted)">${esc(p.cat)}</span></td>
              <td style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text-muted)">${esc(p.oem||'-')}</td>
              <td>${cond?condBadge(cond):'<span style="color:var(--text-dim);font-size:12px">-</span>'}</td>
              <td style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:${loc?'var(--text)':'var(--text-dim)'}">${esc(loc||'-')}</td>
              <td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:${failRank&&failRank<=10?'var(--danger)':failRank<=25?'var(--warning)':'var(--text-muted)'}">${failRank||'-'}</td>
              <td style="text-align:right;font-weight:700;font-size:16px;font-family:'Bebas Neue',sans-serif;color:${isZero?'var(--text-dim)':(topInv?.low_stock_threshold!==null&&topInv?.low_stock_threshold!==undefined&&qty<=topInv.low_stock_threshold)?'var(--danger)':'var(--accent)'}">${qty}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

async function renderPartProfile(arg){
  const el=document.getElementById('view-part-profile');
  if(!el) return;
  el.innerHTML='<div style="padding:60px;text-align:center;color:var(--text-muted)">Loading part profile...</div>';

  const id = arg?.id;
  const type = arg?.type || 'catalog';
  _currentPartProfile={id, name:GMT800.find(p=>p.id===id)?.name||id, type};

  let cp=null, inv=[];
  if(type==='catalog'){
    cp=GMT800.find(p=>p.id===id);
    inv=dbInventory.filter(p=>p.catalog_part_id===id);
  } else {
    const p=dbInventory.find(p=>p.id===id);
    if(p){
      cp={id:p.id, name:p.name, cat:p.source||'Custom', sub:'', oem:p.part_number||'', afm:p.oem_part_number||'', rank:999, fits:'all', desc:p.notes||''};
      inv=[p];
    }
  }
  if(!cp){
    el.innerHTML='<div style="padding:60px;text-align:center;color:var(--danger)">Part not found. <button class="btn btn-secondary btn-sm" onclick="showView(\'parts\')">← Back to Parts</button></div>';
    return;
  }

  const totalQty = inv.reduce((sum,p)=>sum+p.quantity, 0);
  const topInv = inv[0];

  // Fetch installation history
  let installs=[];
  try{
    const r = await withTimeout(db.from('part_installations').select('*,vehicles(id,year,make,model,notes)').in('part_id', inv.length?inv.map(p=>p.id):['00000000-0000-0000-0000-000000000000']).order('installed_date',{ascending:false}));
    installs = r.data || [];
  }catch(e){ installs=[]; }

  // Compatible vehicles - need to look them up from DB
  let vehiclesList=[];
  try{
    const rv = await withTimeout(db.from('vehicles').select('id,year,make,model,trim,notes').order('year'));
    vehiclesList = rv.data || [];
  }catch(e){ vehiclesList=[]; }

  // Determine which actual vehicles are compatible
  const compatVehicles = vehiclesList.filter(v=>{
    if(cp.fits==='all') return true;
    if(cp.fits==='esc') return v.make==='Cadillac';
    if(cp.fits==='yk') return v.make==='GMC';
    return false;
  });

  const qrData = encodeURIComponent('CHICKEN ZONE\n'+cp.name+'\nOEM:'+(cp.oem||'N/A')+'\nLoc:'+(topInv?.shelf_location||'N/A'));
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&bgcolor=0f0f0f&color=FFD700&data='+qrData;

  // Amazon search - detailed like YouTube
  const amazonQ = encodeURIComponent(cp.name+' '+(cp.oem||'')+' GMT800 '+(cp.fits==='esc'?'Cadillac Escalade':'GMC Yukon Denali')+' '+cp.cat);
  const youtubeQ = encodeURIComponent(cp.name+' GMT800 replacement install');

  // Get detail data (tools/hardware/time/tip) and extract any failure hints from description
  const pd = PART_DETAILS[cp.id] || null;

  // Extract common errors from description (the "X = bad Y" patterns)
  let commonErrors = [];
  if(cp.desc){
    const hintRegex = /([^.]*=[^.]*\.)/g;
    const matches = cp.desc.match(hintRegex) || [];
    commonErrors = matches.map(m=>m.trim()).filter(m=>m.length>5);

// Get display name for a vehicle from notes field (Driver: X format)
function getVehicleDisplayName(v){
  if(!v) return 'Unknown';
  const notes = v.notes || '';
  const driverMatch = notes.match(/Driver:\s*([^.,\n]+)/i);
  if(driverMatch){
    const driver = driverMatch[1].trim();
    return driver+"'s "+v.model;
  }
  return v.year+' '+v.make+' '+v.model;
}

async function uploadPartPhotoFromProfile(invId,cpId,file){
  if(!file) return;
  if(!invId){
    // No inventory record yet - offer to add
    if(confirm('This part is not in your inventory yet. Add it to inventory first?')){
      showAddSpecificPart(cpId);
    }
    return;
  }
  toast('Uploading...','info');
  try{
    const url=await uploadFile('parts-images',file);
    await db.from('parts').update({image_url:url}).eq('id',invId);
    // Refresh inventory cache
    const {data:inv}=await db.from('parts').select('*');
    dbInventory=inv||[];
    toast('Photo saved!','success');
    // Re-render the full-page part profile
    await renderPartProfile({id:cpId, type:'catalog'});
  }catch(e){toast('Upload error: '+e.message,'error');}
}

// ─── INVENTORY LOCATION RENDERER ─────────────────────────────────────────────
function renderInvLocations(inv, partName, partOem){
  if(!inv||!inv.length) return "";
  var Q = String.fromCharCode(39); // single quote character
  return inv.map(function(item){
    var hasLoc = !!item.shelf_location;
    var qrData = encodeURIComponent("CHICKEN ZONE\n" + partName + "\nOEM:" + (partOem || "N/A") + "\nLoc:" + (item.shelf_location || "N/A"));
    var qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=120x120&bgcolor=0f0f0f&color=FFD700&data=" + qrData;
    var html = "<div style=\"padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)\">";
    html += "<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px\">";
    html += "<span style=\"font-family:Bebas Neue,sans-serif;font-size:20px;color:var(--accent)\">x" + item.quantity + "</span>";
    html += "<span style=\"flex:1;font-size:12px;color:var(--text-muted)\">" + (item.condition || "") + "</span>";
    if (hasLoc) {
      html += "<span style=\"font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;color:var(--text)\">&#x1F4CD; " + esc(item.shelf_location) + "</span>";
    } else {
      html += "<span style=\"font-size:12px;color:var(--danger)\">No location set</span>";
    }
    html += "</div>";
    html += "<div style=\"display:flex;gap:6px;flex-wrap:wrap\">";
    html += "<button class=\"btn btn-secondary btn-sm\" onclick=\"showLocationModal(" + Q + item.id + Q + ")\">&#x1F4CD; Set Location</button>";
    if (hasLoc) {
      html += "<a href=\"" + qrUrl + "\" download=\"part-label.png\" class=\"btn btn-ghost btn-sm\">&#x2B07;&#xFE0F; QR</a>";
      html += "<button class=\"btn btn-ghost btn-sm\" onclick=\"printPartLabel(" + Q + esc(partName).replace(/'/g, "&#39;") + Q + "," + Q + qrUrl + Q + "," + Q + esc(partOem) + Q + "," + Q + esc(item.shelf_location || "") + Q + ")\">&#x1F5A8;&#xFE0F; Print</button>";
    }
    html += "</div></div>";
    return html;
  }).join("");
}

async function showQRScanner(partId){
  document.getElementById('qr-section').style.display='block';
  document.getElementById('loc-select-section').style.display='none';
  try{
    cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const video=document.getElementById('qr-video');
    video.srcObject=cameraStream;
    scanQRLoop(partId);
  }catch(e){document.getElementById('qr-status').textContent='Camera not available. Please use the select option.';document.getElementById('loc-select-section').style.display='block'}
}

function scanQRLoop(partId){
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  if(!canvas||!video||!cameraStream) return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR&&jsQR(img.data,img.width,img.height);
    if(code&&code.data){
      stopCamera();
      const loc=code.data.trim();
      document.getElementById('qr-status').textContent=`✅ Scanned: "${loc}"`;
      setTimeout(()=>saveLocation(partId,loc),600);
      return;
    }
  }
  requestAnimationFrame(()=>scanQRLoop(partId));
}

async function saveLocation(partId,location){
  if(!location)return toast('Please enter a location','error');
  const locs=getLocations();if(!locs.includes(location)){locs.push(location);saveLocations(locs)}

  if(error){toast(error.message,'error');return}
  toast('Location saved!','success');closeModal();
  const{data:inv}=await db.from('parts').select('*');dbInventory=inv||[];renderPartsList();
}

    </div>

async function runAIScan(){
  const file=document.getElementById('ai-receipt-file').files[0];
  const url=val('ai-url');
  if(!file&&!url)return toast('Please upload a receipt or enter a URL','error');
  const statusEl=document.getElementById('ai-status');
  statusEl.style.display='block';statusEl.textContent='🤖 Analyzing receipt...';

  try{
    let imageData=null;
    if(file){
      imageData=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
    }
    const prompt=file?`You are analyzing a parts receipt photo. Extract information and respond ONLY with valid JSON (no markdown, no backticks):
{"part_name":"","part_number":"","source":"","price":"","date_purchased":"","notes":""}
If you cannot determine a value, use empty string. Be concise.`
    :`The user ordered a part from this URL: ${url}
Extract any part info and respond ONLY with valid JSON (no markdown):
{"part_name":"","part_number":"","source":"","price":"","date_purchased":"","notes":""}`;

    const messages=[{role:'user',content:imageData?[{type:'image',source:{type:'base64',media_type:file.type,data:imageData}},{type:'text',text:prompt}]:[{type:'text',text:prompt}]}];
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages})});
    const data=await resp.json();
    const raw=data.content?.[0]?.text||'{}';
    const extracted=JSON.parse(raw.replace(/```json?|```/g,'').trim());
    statusEl.textContent='✅ Done! Review and complete the details below.';
    showAIConfirmForm(extracted,file);
  }catch(e){
    statusEl.style.display='none';
    // Fallback: open manual form
    toast('AI scan unavailable  -  using manual form instead','info');
    startManualWizard();
  }
}

  let data={created_by:currentUser.id,low_stock_threshold:lowStockThreshold===null?null:lowStockThreshold};
  let receiptFile=null,imgFile=null;

  const snap=window._wizSnap||{};
  if(source==='wizard'){
    if(!wizardPart)return toast('No part selected','error');
    const cond=snap.cond||val('wz-cond');
    const qty=snap.qty||parseInt(document.getElementById('wz-qty')?.value)||1;
    if(!cond)return toast('Please select a condition','error');
    data={...data,catalog_part_id:wizardPart.id,name:wizardPart.name,
      part_number:snap.partnum||val('wz-partnum')||wizardPart.oem||null,
      oem_part_number:snap.oem2||val('wz-oem2')||wizardPart.afm||null,
      condition:cond,quantity:qty,
      source:snap.src||val('wz-src')||null,
      date_acquired:snap.date||val('wz-date')||null,
      price_paid:parseFloat(snap.price||val('wz-price'))||null,
      sourced_from_vehicle:snap.from||val('wz-from')||null,

    receiptFile=document.getElementById('wz-file')?.files[0];
    imgFile=document.getElementById('wz-img')?.files[0];
  } else {
    const name=snap.cfName||val('cf-name');
    const cond=snap.cfCond||val('cf-cond');
    const qty=snap.cfQty||parseInt(document.getElementById('cf-qty')?.value)||1;
    if(!name)return toast('Part name is required','error');
    if(!cond)return toast('Please select a condition','error');
    data={...data,name,
      part_number:snap.cfNum||val('cf-num')||null,
      source:snap.cfSrc||val('cf-src')||null,
      date_acquired:snap.cfDate||val('cf-date')||null,
      price_paid:parseFloat(snap.cfPrice||val('cf-price'))||null,
      notes:snap.cfNotes||val('cf-notes')||null,
      condition:cond,quantity:qty};
    receiptFile=window._aiReceiptFile;
  }

  try{
    if(receiptFile)data.receipt_url=await uploadFile('receipts',receiptFile);
    if(imgFile)data.image_url=await uploadFile('parts-images',imgFile);
  }catch(e){toast('Upload error: '+e.message,'error');return}

  const{error}=await db.from('parts').insert(data);
  if(error){toast(error.message,'error');return}
  toast('Part added to inventory! 🎉','success');
  window._aiReceiptFile=null;
  closeModal();

// ─── VEHICLE PROFILE - FULL PAGE VIEW ────────────────────────────────────────
let _currentVehicleProfile={id:null,tab:'overview'};

async function renderVehicleProfile(arg){
  const el=document.getElementById('view-vehicle-profile');
  if(!el) return;
  el.innerHTML='<div style="padding:60px;text-align:center;color:var(--text-muted)">Loading vehicle profile...</div>';

  const id = arg?.id;
  if(!id){
    el.innerHTML='<div style="padding:60px"><button class="btn btn-secondary btn-sm" onclick="showView(\'vehicles\')">← Back to Vehicles</button></div>';
    return;
  }

  // Preserve tab from previous render or use default
  if(_currentVehicleProfile.id !== id){
    _currentVehicleProfile = {id:id, tab:'overview'};
  }

  let v=null, services=[], reminders=[], installs=[], mileLogs=[];
  try{
    const vRes = await withTimeout(db.from('vehicles').select('*').eq('id',id).single());
    v = vRes.data;
    if(!v) throw new Error('Vehicle not found');
    const r = await withTimeout(Promise.all([
      db.from('service_history').select('*').eq('vehicle_id',id).order('performed_date',{ascending:false}),
      db.from('maintenance_reminders').select('*').eq('vehicle_id',id).eq('is_active',true).order('created_at'),
      db.from('part_installations').select('*,parts(name,part_number,condition,catalog_part_id)').eq('vehicle_id',id).order('installed_date',{ascending:false}),
      db.from('mileage_logs').select('*').eq('vehicle_id',id).order('logged_at',{ascending:false}).limit(6)
    ]));
    services = r[0].data || [];
    reminders = r[1].data || [];
    installs = r[2].data || [];
    mileLogs = r[3].data || [];
  }catch(err){
    el.innerHTML='<div style="padding:32px"><button class="btn btn-secondary btn-sm" onclick="showView(\'vehicles\')">← Back</button><div class="alert alert-danger" style="margin-top:16px">Error loading vehicle: '+err.message+'</div></div>';
    return;
  }

  const today = new Date();
  const dueReminders = reminders.filter(function(r){
    if(r.snoozed_until_date && new Date(r.snoozed_until_date) > today) return false;
    if(r.next_due_date && new Date(r.next_due_date) <= today) return true;
    if(r.next_due_mileage && (v.current_mileage||0) >= r.next_due_mileage) return true;
    return false;
  });

  const driverName = getVehicleDisplayName(v);
  const subtitle = [v.make, v.model, v.trim].filter(Boolean).join(' ').replace(/\s+AWD$/,'');

  // Extract engine and transmission from notes
  const engineMatch = (v.notes||'').match(/Engine:\s*([^.,\n]+)/i);
  const transMatch = (v.notes||'').match(/Trans(?:mission)?:\s*([^.,\n]+)/i);
  const interiorMatch = (v.notes||'').match(/([A-Za-z]+)\s+interior/i);
  const engine = engineMatch ? engineMatch[1].trim() : '';
  const transmission = transMatch ? transMatch[1].trim() : '';
  const interiorColor = interiorMatch ? interiorMatch[1] : '';

  const tab = _currentVehicleProfile.tab || 'overview';

  let html = '';

  // Hero header matching the list card style
  html += '<div style="background:linear-gradient(135deg,#0a0a1a 0%,#151525 100%);margin:-32px -32px 24px -32px;padding:28px 32px;border-bottom:2px solid var(--accent);position:relative;overflow:hidden">';
  html += '<button class="btn btn-ghost btn-sm" onclick="showView(\'vehicles\')" style="margin-bottom:12px">← Back to Vehicles</button>';
  html += '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:120px;color:var(--accent);line-height:1;opacity:.15;position:absolute;right:24px;top:30px">'+v.year+'</div>';
  html += '<div style="position:relative">';
  html += '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:40px;font-weight:700;text-transform:uppercase;color:var(--text);line-height:1">'+esc(driverName)+'</div>';
  html += '<div style="color:var(--text-muted);font-size:14px;margin-top:4px;display:flex;align-items:center;gap:10px">'+esc(subtitle);
  if(v.color) html += '<span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:'+colorToCss(v.color)+';border:1px solid rgba(255,255,255,.2)" title="'+esc(v.color)+'"></span>';
  html += '</div>';
  html += '<div style="color:var(--text-muted);font-size:13px;margin-top:12px">🛣 <strong style="color:var(--text)">'+(v.current_mileage||0).toLocaleString()+'</strong> miles'+(v.vin?' · VIN: '+esc(v.vin):'')+'</div>';
  html += '<div class="flex-row no-print" style="flex-wrap:wrap;gap:6px;margin-top:16px">';
  html += '<button class="btn btn-secondary btn-sm" onclick="showLogMileageModal(\''+id+'\')">🛣 Log Miles</button>';
  html += '<button class="btn btn-secondary btn-sm" onclick="showVehicleModal(\''+id+'\')">✏️ Edit</button>';
  html += '<button class="btn btn-secondary btn-sm" onclick="printVehicleProfile(\''+id+'\')">🖨️ Print</button>';
  html += '<button class="btn btn-danger btn-sm" onclick="confirmDeleteVehicle(\''+id+'\',\''+esc(driverName).replace(/'/g,'&#39;')+'\')">🗑️</button>';
  html += '</div></div></div>';

  // Due reminders banner
  if(dueReminders.length > 0){
    html += '<div class="alert alert-warning" style="margin-bottom:20px">⚠️ <strong>'+dueReminders.length+' maintenance item'+(dueReminders.length>1?'s':'')+' due</strong></div>';
  }

  // Tabs
  html += '<div class="tabs no-print">';
  const tabs = [
    {id:'overview', label:'Overview'},
    {id:'service', label:'Service History ('+services.length+')'},
    {id:'parts', label:'Installed Parts ('+installs.filter(function(i){return !i.removed_date;}).length+')'},
    {id:'photos', label:'Photos'},
    {id:'reminders', label:'Maintenance ('+reminders.length+')'}
  ];
  tabs.forEach(function(t){
    html += '<div class="tab '+(tab===t.id?'active':'')+'" onclick="setVehicleTab(\''+t.id+'\')">'+t.label+'</div>';
  });
  html += '</div>';

  html += '<div id="vehicle-tab-content">';
  if(tab==='overview') html += renderVehicleOverview(v, engine, transmission, interiorColor, mileLogs, services, installs);
  else if(tab==='service') html += renderServiceTab(services, id);
  else if(tab==='parts') html += renderPartsTab(installs, id);
  else if(tab==='photos') html += renderPhotosTab(v);
  else if(tab==='reminders') html += renderRemindersTab(reminders, v, id);
  html += '</div>';

  el.innerHTML = html;
}

function setVehicleTab(tab){
  _currentVehicleProfile.tab = tab;
  renderVehicleProfile({id: _currentVehicleProfile.id});
}

function renderVehicleOverview(v, engine, transmission, interiorColor, mileLogs, services, installs){
  const active = (installs||[]).filter(function(i){return !i.removed_date;});
  let html = '<div class="grid-2" style="gap:16px">';

  // Left: specs
  html += '<div class="card"><div class="stat-label" style="margin-bottom:12px">Vehicle Specs</div>';
  html += '<div class="detail-field" style="margin-bottom:10px"><label>Engine</label><div class="value" style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;color:var(--accent)">'+esc(engine||'Not specified')+'</div></div>';
  html += '<div class="detail-field" style="margin-bottom:10px"><label>Transmission</label><div class="value" style="font-family:\'Barlow Condensed\',sans-serif;font-size:18px;color:var(--accent)">'+esc(transmission||'Not specified')+'</div></div>';
  if(interiorColor){
    html += '<div class="detail-field" style="margin-bottom:10px"><label>Interior</label><div class="value" style="display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+colorToCss(interiorColor)+';border:1px solid rgba(255,255,255,.2)"></span>'+esc(interiorColor)+'</div></div>';
  }
  html += '</div>';

  // Right: mileage
  html += '<div class="card"><div class="stat-label" style="margin-bottom:12px">Recent Mileage Logs</div>';
  if((mileLogs||[]).length===0){
    html += '<div style="color:var(--text-muted);font-size:13px">No mileage logged yet</div>';
  } else {
    mileLogs.forEach(function(l){
      html += '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">';
      html += '<span style="font-weight:600;font-family:\'Barlow Condensed\',sans-serif;font-size:16px">'+l.mileage.toLocaleString()+' mi</span>';
      html += '<span style="color:var(--text-muted)">'+fmtDate(l.logged_at)+'</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div>';

  // Stats row
  html += '<div class="grid-2" style="gap:16px;margin-top:16px">';
  html += '<div class="stat-card"><div class="stat-label">Service Records</div><div class="stat-value">'+services.length+'</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Active Parts</div><div class="stat-value">'+active.length+'</div></div>';
  html += '</div>';

  // Notes
  if(v.notes){
    // Filter out the structured fields from notes for display
    let cleanNotes = v.notes
      .replace(/Driver:\s*[^.,\n]+[.,]?\s*/i, '')
      .replace(/Engine:\s*[^.,\n]+[.,]?\s*/i, '')
      .replace(/Trans(?:mission)?:\s*[^.,\n]+[.,]?\s*/i, '')
      .replace(/Automatic\s+climate\s+control[.,]?\s*/i, '')
      .replace(/[A-Za-z]+\s+interior[.,]?\s*/i, '')
      .trim();
    if(cleanNotes){
      html += '<div class="card" style="margin-top:16px"><div class="stat-label" style="margin-bottom:8px">Notes</div><div style="font-size:13px;color:var(--text-muted);line-height:1.6">'+esc(cleanNotes)+'</div></div>';
    }
  }

  return html;
}
